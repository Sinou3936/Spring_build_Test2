spring:
  application:
    name: Spring_build_Test2
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # [DB명] 은 교체
    url: jdbc:mysql://localhost:3306/sbb?useUnicode=true&characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Seoul&useSSL=false
    username: root
    password: 1234

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
logging:
  level:
    # SQL 실행할 때 파라미터 값 확인용 로그
    org.hibernate.orm.jdbc.bind: TRACE
    # SQL 실행 후 조회 결과 확인용 로그
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.transaction.interceptor: TRACE