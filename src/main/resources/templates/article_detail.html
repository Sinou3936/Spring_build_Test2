<h1>게시글 상세페이지</h1>

<h1 th:text="${article.title}"></h1>
<div th:text="${article.content}"></div>

<div class="d-flex flex-column gap-2" style="width: 120px;">

    <!-- 수정 -->
    <form th:action="@{/article/modify/{id}(id=${article.id})}"
          method="get"
          class="m-0 w-100">

        <button type="submit" class="btn btn-primary w-100">
            수정
        </button>

    </form>

    <!-- 삭제 -->
    <form th:action="@{/article/delete/{id}(id=${article.id})}"
          method="post"
          class="m-0 w-100"
          onsubmit="return confirm('정말 삭제할까요?');">

        <button type="submit" class="btn btn-danger w-100">
            삭제
        </button>

    </form>

    <!-- 돌아가기 -->
    <form th:action="@{/article/list}" method="get">
        <button type="submit" class="btn btn-primary w-100">
            돌아가기
        </button>
    </form>

</div>
