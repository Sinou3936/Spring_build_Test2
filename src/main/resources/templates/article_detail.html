<html lang="ko" layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="container" style="max-width: 860px;">
    <div class="page-card">
        <div class="page-title" th:text="${article.title}"></div>

        <div class="article-content mb-4" th:text="${article.content}"></div>

        <div class="d-flex gap-2" th:if="${session.loginMember != null and article.author.id == session.loginMember.id}">
            <form th:action="@{/article/modify/{id}(id=${article.id})}" method="get" class="m-0">
                <button type="submit" class="btn btn-primary">수정</button>
            </form>
            <form th:action="@{/article/delete/{id}(id=${article.id})}" method="post" class="m-0"
                  onsubmit="return confirm('정말 삭제할까요?');">
                <button type="submit" class="btn btn-danger">삭제</button>
            </form>
            <form th:action="@{/article/list}" method="get" class="m-0 ms-auto">
                <button type="submit" class="btn btn-outline-secondary">← 목록으로</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
