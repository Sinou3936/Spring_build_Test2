<html lang="ko" layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="auth-wrapper">
    <div class="auth-card">
        <h2>회원가입</h2>
        <form th:action="@{/user/signup}" th:object="${memberCreateForm}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">사용자 ID</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="아이디 입력">
                <div class="error-msg" th:errors="*{username}"></div>
            </div>
            <div class="mb-3">
                <label for="password1" class="form-label">비밀번호</label>
                <input type="password" th:field="*{password1}" class="form-control" placeholder="비밀번호 입력">
                <div class="error-msg" th:errors="*{password1}"></div>
            </div>
            <div class="mb-3">
                <label for="password2" class="form-label">비밀번호 확인</label>
                <input type="password" th:field="*{password2}" class="form-control" placeholder="비밀번호 재입력">
                <div class="error-msg" th:errors="*{password2}"></div>
            </div>
            <div class="mb-4">
                <label for="nickname" class="form-label">닉네임</label>
                <input type="text" th:field="*{nickname}" class="form-control" placeholder="닉네임 입력">
                <div class="error-msg" th:errors="*{nickname}"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">회원가입</button>
        </form>
        <hr class="my-3">
        <div class="text-center" style="font-size:.9rem; color: var(--text-muted);">
            이미 계정이 있으신가요? <a href="/user/login" style="color: var(--primary); font-weight:600;">로그인</a>
        </div>
    </div>
</div>
</body>
</html>
