<html lang="ko" layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="container" style="max-width: 760px;">
    <div class="page-card">
        <div class="page-title">게시글 수정</div>

        <form th:action="@{/article/modify/{id}(id=${article.id})}" method="post">
            <input type="hidden" name="id" th:value="${article.id}">

            <div class="mb-3">
                <label class="form-label">제목</label>
                <input type="text" name="title" class="form-control"
                       th:value="${article.title}" placeholder="제목을 입력하세요">
            </div>
            <div class="mb-4">
                <label class="form-label">내용</label>
                <textarea name="content" class="form-control" rows="12"
                          th:text="${article.content}" placeholder="내용을 입력하세요"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">수정 완료</button>
                <a th:href="@{/article/detail/{id}(id=${article.id})}" class="btn btn-outline-secondary ms-auto">← 상세로</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
