<html lang="ko" layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="auth-wrapper">
    <div class="auth-card">
        <h2>로그인</h2>
        <form th:action="@{/user/login}" th:object="${memberLoginForm}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">사용자 ID</label>
                <input type="text" th:field="*{username}" class="form-control" placeholder="아이디 입력">
                <div class="error-msg"
                     th:if="${#fields.hasErrors('username')}"
                     th:errors="*{username}"></div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="비밀번호 입력">
                <div class="error-msg"
                     th:if="${#fields.hasErrors('password')}"
                     th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>
        <hr class="my-3">
        <div class="text-center" style="font-size:.9rem; color: var(--text-muted);">
            계정이 없으신가요? <a href="/user/signup" style="color: var(--primary); font-weight:600;">회원가입</a>
        </div>
    </div>
</div>
</body>
</html>
