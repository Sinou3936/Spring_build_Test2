<html lang="ko" layout:decorate="~{layout}" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<body>
<div layout:fragment="content" class="container" style="max-width: 760px;">
    <div class="page-card">
        <div class="page-title">게시글 등록</div>

        <form th:action="@{/article/create}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" name="title" id="title" class="form-control" placeholder="제목을 입력하세요">
            </div>
            <div class="mb-4">
                <label for="content" class="form-label">내용</label>
                <textarea name="content" id="content" class="form-control" rows="12" placeholder="내용을 입력하세요"></textarea>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">저장하기</button>
                <a th:href="@{/article/list}" class="btn btn-outline-secondary ms-auto">← 목록으로</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
